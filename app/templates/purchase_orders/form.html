{% extends "base.html" %}
{% block title %}新增採購單 — Stanis IMS{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">新增採購單</h4>
  <a href="/po" class="btn btn-sm btn-outline-secondary">← 返回</a>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card">
  <div class="card-body">
    <form method="post" action="/po/new" id="po-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <label class="form-label">供應商 <span class="text-danger">*</span></label>
          <select name="supplier_id" class="form-select" required>
            <option value="">— 選擇 —</option>
            {% for s in suppliers %}
            <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">倉庫 <span class="text-danger">*</span></label>
          <select name="warehouse_id" class="form-select" required>
            <option value="">— 選擇 —</option>
            {% for w in warehouses %}
            <option value="{{ w.id }}">{{ w.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">預計到貨日期</label>
          <input type="date" name="expected_at" class="form-control">
        </div>
      </div>

      <h6>明細項目</h6>
      <div class="table-responsive mb-3">
        <table class="table table-sm" id="lines-table">
          <thead class="table-light">
            <tr><th>商品</th><th>數量</th><th>單位成本</th><th></th></tr>
          </thead>
          <tbody id="lines-body">
            <tr class="line-row">
              <td>
                <select name="product_id[]" class="form-select form-select-sm" required>
                  <option value="">— 選擇商品 —</option>
                  {% for p in products %}
                  <option value="{{ p.id }}">{{ p.sku }} — {{ p.name }}</option>
                  {% endfor %}
                </select>
              </td>
              <td><input type="number" name="quantity[]" class="form-control form-control-sm" min="1" required></td>
              <td><input type="number" name="unit_cost[]" class="form-control form-control-sm" step="0.01" min="0" value="0"></td>
              <td><button type="button" class="btn btn-sm btn-outline-danger remove-line" disabled>✕</button></td>
            </tr>
          </tbody>
        </table>
      </div>
      <button type="button" class="btn btn-sm btn-outline-secondary mb-3" id="add-line"><i class="bi bi-plus"></i> 新增明細</button>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">建立採購草稿</button>
        <a href="/po" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const tbody = document.getElementById('lines-body');
const products = [
  {% for p in products %}
  { id: {{ p.id }}, sku: {{ p.sku|tojson }}, name: {{ p.name|tojson }} }{% if not loop.last %},{% endif %}
  {% endfor %}
];

function buildProductOptions() {
  return '<option value="">— 選擇商品 —</option>' +
    products.map(p => `<option value="${p.id}">${p.sku} — ${p.name}</option>`).join('');
}

document.getElementById('add-line').addEventListener('click', () => {
  const row = document.createElement('tr');
  row.className = 'line-row';
  row.innerHTML = `
    <td><select name="product_id[]" class="form-select form-select-sm" required>${buildProductOptions()}</select></td>
    <td><input type="number" name="quantity[]" class="form-control form-control-sm" min="1" required></td>
    <td><input type="number" name="unit_cost[]" class="form-control form-control-sm" step="0.01" min="0" value="0"></td>
    <td><button type="button" class="btn btn-sm btn-outline-danger remove-line">✕</button></td>`;
  tbody.appendChild(row);
  updateRemoveButtons();
});

tbody.addEventListener('click', e => {
  if (e.target.classList.contains('remove-line')) {
    e.target.closest('tr').remove();
    updateRemoveButtons();
  }
});

function updateRemoveButtons() {
  const rows = tbody.querySelectorAll('.line-row');
  rows.forEach((r, i) => {
    const btn = r.querySelector('.remove-line');
    btn.disabled = rows.length === 1;
  });
}
</script>
{% endblock %}
