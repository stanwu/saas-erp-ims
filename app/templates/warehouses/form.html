{% extends "base.html" %}
{% block title %}{% if warehouse %}Edit Warehouse{% else %}New Warehouse{% endif %} — Stanis IMS{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">{% if warehouse %}Edit Warehouse{% else %}New Warehouse{% endif %}</h4>
  <a href="/warehouses" class="btn btn-sm btn-outline-secondary">← Back</a>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card">
  <div class="card-body">
    <form method="post" action="{% if warehouse %}/warehouses/{{ warehouse.id }}/edit{% else %}/warehouses/new{% endif %}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" value="{{ warehouse.name if warehouse else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control" value="{{ warehouse.location if warehouse else '' }}">
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_active" id="is_active" value="on"
              {% if (warehouse and warehouse.is_active) or not warehouse %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Active</label>
          </div>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">{% if warehouse %}Save Changes{% else %}Create Warehouse{% endif %}</button>
          <a href="/warehouses" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
