{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <div>
    <h2>New Movement</h2>
    <p>Record incoming, outgoing, or adjustment stock changes.</p>
  </div>
</section>

<section class="panel form-panel">
  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}
  <form method="post" class="stack">
    <label>Product
      <select name="product_id" required>
        <option value="">Select product</option>
        {% for product in products %}
        <option value="{{ product.id }}" {% if form.get('product_id') == product.id %}selected{% endif %}>
          {{ product.sku }} - {{ product.name }} ({{ product.stock_quantity }})
        </option>
        {% endfor %}
      </select>
    </label>
    <label>Type
      <select name="movement_type" required>
        {% for item in movement_types %}
        <option value="{{ item.value }}" {% if form.get('movement_type') == item.value %}selected{% endif %}>
          {{ item.value }}
        </option>
        {% endfor %}
      </select>
    </label>
    <label>Quantity
      <input type="number" name="quantity" value="{{ form.get('quantity', 1) }}" required>
    </label>
    <label>Note
      <textarea name="note">{{ form.get('note', '') }}</textarea>
    </label>
    <button type="submit" class="button">Save Movement</button>
  </form>
</section>
{% endblock %}
